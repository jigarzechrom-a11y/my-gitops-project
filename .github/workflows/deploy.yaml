name: CI/CD Pipeline
on:
  push:
    branches: [ "main" ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/nginx-app:${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/nginx-app:${{ github.sha }}

      - name: Update K8s Manifest
        run: |
          sed -i "s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/nginx-app:${{ github.sha }}|g" k8s/deployment.yaml
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add k8s/deployment.yaml
          git commit -m "Update image to ${{ github.sha }} [skip ci]"
          git push
