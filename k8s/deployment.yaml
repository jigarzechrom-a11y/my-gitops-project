apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: jigarzechrom/nginx-app:0d9c991a4bf8cef0107b4dcacd073347de936890
        ports:
        - containerPort: 80
