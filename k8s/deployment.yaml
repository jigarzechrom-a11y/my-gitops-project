apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: jigarzechrom/nginx-app:cb70dcd7afcd788eaf92eb4528d5db90b2cb7d37
        ports:
        - containerPort: 80
