apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/jigarzechrom-a11y/my-gitops-project.git'
    targetRevision: HEAD
    path: k8s  # Folder jahan deployment.yaml rakha hai
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
